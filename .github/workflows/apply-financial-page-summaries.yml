name: Apply targeted financial page summaries

on:
  push:
    branches:
      - feature/financial-page-summaries

permissions:
  contents: write

jobs:
  apply-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/financial-page-summaries
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install focused test dependencies
        run: python -m pip install reportlab pypdf

      - name: Apply targeted changes
        run: python .github/scripts/apply_financial_page_summaries.py

      - name: Correct generated UI assertion
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/test_financial_summary_ui.py')
          content = path.read_text(encoding='utf-8')
          content = content.replace(
              'self.assertIn("financialized_invoice_value_for_month_cents", js.replace("finalized", "financialized", 1))',
              'self.assertIn("finalized_invoice_value_for_month_cents", js)',
          )
          path.write_text(content, encoding='utf-8')
          PY

      - name: Stage for safety inspection
        run: git add -A

      - name: Run focused financial summary tests
        run: PYTHONPATH=app python -m unittest discover -s tests -p 'test_financial_summary*.py'

      - name: Run privacy and Git safety checks
        run: |
          bash scripts/privacy_check.sh
          bash scripts/git_safety_check.sh
          git diff --cached --check

      - name: Commit and push sanitized feature
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat: add shared financial page summaries [skip ci]'
          git push origin HEAD:feature/financial-page-summaries
